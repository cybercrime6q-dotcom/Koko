services:
  - type: web
    name: app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:                        # kalau ada variabel environment
      - key: SECRET_KEY
        value: your_secret_key
      - key: DATABASE_URL
        fromDatabase:
          name: my-db
          property: connectionString
    healthCheckPath: /              # endpoint untuk health check
    autoDeploy: true                # auto deploy saat push ke repo